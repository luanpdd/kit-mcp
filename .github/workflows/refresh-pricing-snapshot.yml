name: Refresh pricing snapshot

# Phase 172 (Cost Tracking) — refresh weekly do snapshot LiteLLM embedded em
# `src/core/cost/pricing-snapshot.json`. SEMPRE abre PR para review humano,
# NUNCA faz auto-merge. Mitigação ao G12 (LiteLLM lag-behind): mantém o
# snapshot fresco com janela máxima de 1 semana sem intervenção manual.
#
# Trigger manual: `gh workflow run refresh-pricing-snapshot.yml`.

on:
  schedule:
    # Toda segunda-feira 00:00 UTC. Fora de horário comercial pra não competir
    # com CI de PRs ativos.
    - cron: '0 0 * * 1'
  workflow_dispatch: {}

permissions:
  contents: write       # commit do diff em branch chore/refresh-pricing-*
  pull-requests: write  # abrir o PR via peter-evans/create-pull-request

concurrency:
  # Apenas 1 refresh por vez. Se um manual_dispatch sobrepuser o cron, o segundo
  # entra na fila — NÃO cancela em progresso (cancel-in-progress: false),
  # pra evitar deixar branch órfão.
  group: pricing-snapshot-refresh
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Node 20
        uses: actions/setup-node@v6
        with:
          node-version: '20'

      - name: Regenerate pricing snapshot
        # Script manual (NUNCA encadeado em prepublishOnly — preserva offline-safe).
        # Fetcha LiteLLM raw + filtra anthropic/claude + grava snapshot + meta.
        run: npm run regen-pricing

      - name: Detect changes
        id: diff
        run: |
          if git diff --quiet src/core/cost/pricing-snapshot.json src/core/cost/pricing-snapshot.meta.json; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "No pricing changes detected — skipping PR."
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
            {
              echo "stats<<EOF"
              git diff --stat src/core/cost/pricing-snapshot.json src/core/cost/pricing-snapshot.meta.json
              echo "EOF"
            } >> "$GITHUB_OUTPUT"
          fi

      - name: Create Pull Request
        if: steps.diff.outputs.changed == 'true'
        uses: peter-evans/create-pull-request@v8
        with:
          branch: chore/refresh-pricing-${{ github.run_id }}
          base: main
          commit-message: |
            chore(pricing): weekly snapshot refresh

            Auto-generated by .github/workflows/refresh-pricing-snapshot.yml
            via `npm run regen-pricing` (LiteLLM raw fetch).
          title: 'chore(pricing): weekly snapshot refresh'
          body: |
            ## Weekly pricing snapshot refresh

            Auto-PR aberto pelo workflow `refresh-pricing-snapshot.yml`.

            ### Diff stats
            ```
            ${{ steps.diff.outputs.stats }}
            ```

            ### Source
            - LiteLLM raw: https://raw.githubusercontent.com/BerriAI/litellm/main/model_prices_and_context_window.json
            - Repo upstream: https://github.com/BerriAI/litellm

            ### Review checklist
            - [ ] Diff em `pricing-snapshot.json` faz sentido (sem deltas absurdos > 10x)
            - [ ] `pricing-snapshot.meta.json` tem novo `sha256` + `fetched_at` + `litellm_commit`
            - [ ] Nenhum modelo crítico foi removido (sonnet/opus/haiku presentes)
            - [ ] `npm test` verde
            - [ ] CHANGELOG entry se houver mudança material de pricing

            **Não usar auto-merge.** Review humano obrigatório.

            ---
            *Workflow run: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}*
          labels: |
            chore
            pricing
            automated
          delete-branch: true
