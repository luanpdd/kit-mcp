name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Audit — stdout discipline in src/ui/ (REQ SEC-04)
        shell: bash
        run: |
          # Sidecar logs must go to stderr or to a file, never stdout —
          # collides with the MCP server's JSON-RPC frame channel.
          # Gate is armed even before src/ui/ exists, so the very first
          # offending file fails CI.
          if [ -d src/ui ]; then
            HITS=$(grep -rn 'console\.log\|process\.stdout\.write' src/ui/ 2>/dev/null || true)
            if [ -n "$HITS" ]; then
              echo "::error::REQ SEC-04 violated — stdout writes found in src/ui/"
              echo "$HITS"
              echo ""
              echo "Sidecar code MUST log to stderr (console.error) or to a file (~/.kit-mcp/ui.log)."
              echo "stdout collides with MCP JSON-RPC frames and breaks the protocol."
              exit 1
            fi
            echo "OK: no stdout writes in src/ui/"
          else
            echo "OK: src/ui/ does not exist yet — gate is armed for when it does"
          fi

      - name: Audit — runtime deps budget (max v1.1.0 baseline + 1)
        shell: bash
        run: |
          # v1.2 budget: 5 baseline (@modelcontextprotocol/sdk, commander,
          # chokidar, picocolors, @inquirer/prompts) + 1 new (open@11) = 6 max.
          BASELINE=5
          BUDGET=$((BASELINE + 1))
          CURRENT=$(node -e "console.log(Object.keys(require('./package.json').dependencies || {}).length)")
          echo "Runtime deps: $CURRENT / $BUDGET"
          if [ "$CURRENT" -gt "$BUDGET" ]; then
            echo "::error::Runtime deps grew to $CURRENT — v1.2 budget is $BUDGET (baseline $BASELINE + 1)"
            echo "If a new dep is genuinely necessary, update this gate and the v1.2 ADR consciously."
            exit 1
          fi

  smoke:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        node: ['20', '22']

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}

      - name: Install
        run: npm ci || npm install

      - name: Tests (unit)
        run: npm test

      - name: Tests (integration)
        run: npm run test:integration

      - name: CLI smoke
        run: |
          node bin/cli.js kit list-agents
          node bin/cli.js sync targets
          node bin/cli.js gates list
          node bin/cli.js install dry-run claude-code --scope project --project-root . --via npx

      - name: Sync round-trip
        shell: bash
        run: |
          mkdir -p .ci-test
          node bin/cli.js sync install claude-code --project-root .ci-test
          test -f .ci-test/.claude/agents/example-reviewer.md
          test -f .ci-test/.claude/commands/example-greeting.md
          test -f .ci-test/.claude/skills/example-skill/SKILL.md
          test -f .ci-test/CLAUDE.md
          # framework + hooks (mirror-tree) — must be projected, not just listed
          test -f .ci-test/.claude/framework/.kit-mcp-managed
          test -f .ci-test/.claude/framework/workflows/new-milestone.md
          test -f .ci-test/.claude/framework/templates/project.md
          test -f .ci-test/.claude/hooks/.kit-mcp-managed
          test -f .ci-test/.claude/hooks/workflow-guard.js
          node bin/cli.js sync remove claude-code --project-root .ci-test
          # After remove, the example stubs should be gone (they had STUB_MARKER)
          test ! -f .ci-test/.claude/agents/example-reviewer.md
          # Mirror-tree dirs should be gone too (they had .kit-mcp-managed marker)
          test ! -d .ci-test/.claude/framework
          test ! -d .ci-test/.claude/hooks
          rm -rf .ci-test

      - name: Mirror-tree safety — preserves user files
        shell: bash
        run: |
          # Verify sync remove DOES NOT delete framework/hooks dirs that lack our marker
          # (i.e. the user managed them manually; we never wrote a marker there)
          mkdir -p .ci-safety/.claude/framework .ci-safety/.claude/hooks
          echo "user content" > .ci-safety/.claude/framework/user-file.md
          echo "user hook"     > .ci-safety/.claude/hooks/user-hook.js
          node bin/cli.js sync remove claude-code --project-root .ci-safety
          test -f .ci-safety/.claude/framework/user-file.md
          test -f .ci-safety/.claude/hooks/user-hook.js
          rm -rf .ci-safety

      - name: MCP server boot
        shell: bash
        run: |
          # Detects import-time crashes (e.g. the DEFAULT_KIT_ROOT regression
          # that made it to v0.4.0). Spawn the server with /dev/null on stdin —
          # a healthy server either stays alive serving stdio, or exits cleanly
          # (code 0) when the SDK detects EOF. An import-time crash exits with
          # a non-zero code well before our 1s timeout.
          node bin/mcp.js < /dev/null &
          PID=$!
          sleep 1
          if kill -0 $PID 2>/dev/null; then
            kill $PID 2>/dev/null || true
            wait $PID 2>/dev/null || true
            echo "OK: MCP server booted and stayed alive"
          else
            set +e
            wait $PID
            EXIT=$?
            set -e
            if [ "$EXIT" = "0" ]; then
              echo "OK: MCP server booted and exited cleanly on stdin EOF"
            else
              echo "MCP server crashed (exit=$EXIT) — likely import-time error"
              exit 1
            fi
          fi
